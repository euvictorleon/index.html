    <!-- Lógica do sistema (JavaScript) -->
    <script>
        let placesService;

        // Função de Inicialização (Autocomplete e Serviço de Busca)
        function iniciarGooglePlaces() {
            // 1. Configura o Autocomplete no campo "Onde?"
            var input = document.getElementById('local');
            var autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.setComponentRestrictions({ country: ["br"] });

            // 2. Inicializa o serviço de busca de lugares (PlacesService)
            // O Google exige um elemento HTML para inicializar esse serviço, criamos um invisível
            const mapDiv = document.createElement('div');
            placesService = new google.maps.places.PlacesService(mapDiv);
        }

        // Garante que o Google Places inicie assim que a página carregar
        window.onload = iniciarGooglePlaces;

        function buscarLeads() {
            const nicho = document.getElementById('nicho').value;
            const local = document.getElementById('local').value;
            const grid = document.getElementById('grid-resultados');

            if (!nicho || !local) {
                alert("Por favor, preencha o que procurar e onde procurar!");
                return;
            }

            // Mostra tela de carregamento
            grid.innerHTML = '<div class="col-span-full text-center py-8"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i><p class="mt-2 text-gray-600">Buscando empresas no Google Maps...</p></div>';
            document.getElementById('contador-resultados').innerText = `Buscando...`;

            // Monta a frase de busca. Ex: "Restaurante em Florianópolis"
            const queryBusca = `${nicho} em ${local}`;

            const request = {
                query: queryBusca
            };

            // Faz a chamada REAL para a API do Google
            placesService.textSearch(request, function(results, status) {
                if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                    grid.innerHTML = ""; // Limpa o carregamento
                    document.getElementById('contador-resultados').innerText = `${results.length} leads encontrados`;

                    // Pega cada resultado que o Google enviou e cria o cartão
                    results.forEach((place, index) => {
                        const nome = place.name || "Nome não disponível";
                        const endereco = place.formatted_address || "Endereço não disponível";
                        const avaliacao = place.rating || "N/A";
                        
                        // NOTA: A busca rápida do Google (textSearch) não traz o telefone.
                        // Para não sobrecarregar sua API, deixei esse placeholder.
                        const telefone = "Disponível na integração"; 

                        const card = `
                            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition flex flex-col justify-between">
                                <div class="p-5 flex-grow">
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="text-lg font-bold text-gray-800 line-clamp-2" title="${nome}">${nome}</h3>
                                        <span class="bg-yellow-100 text-yellow-800 text-xs font-semibold px-2 py-1 rounded flex items-center whitespace-nowrap ml-2"><i class="fa-solid fa-star mr-1 text-yellow-500"></i> ${avaliacao}</span>
                                    </div>
                                    <p class="text-sm text-gray-600 mb-2 line-clamp-2" title="${endereco}"><i class="fa-solid fa-location-dot mr-2 w-4"></i> ${endereco}</p>
                                    <p class="text-sm text-gray-600 mb-4"><i class="fa-solid fa-phone mr-2 w-4"></i> ${telefone}</p>
                                </div>
                                <div class="p-5 pt-0 mt-auto">
                                    <button id="btn-lead-${index}" onclick="enviarParaPipedrive('${index}', '${place.place_id}')" class="w-full bg-green-600 hover:bg-green-700 text-white shadow-md py-2 px-4 rounded font-medium transition duration-300 flex justify-center items-center">
                                        <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Puxar para Pipedrive
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    // Caso o Google não encontre nada ou dê erro
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-3 text-red-400"></i>
                        <p>Nenhuma empresa encontrada para essa busca ou erro de conexão.</p>
                        <p class="text-xs text-gray-400 mt-2">Código do status: ${status}</p>
                    </div>`;
                    document.getElementById('contador-resultados').innerText = `0 leads encontrados`;
                }
            });
        }

        function enviarParaPipedrive(index, placeId) {
            const botao = document.getElementById(`btn-lead-${index}`);
            botao.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Enviado com Sucesso!';
            botao.className = 'w-full py-2 px-4 rounded font-medium transition duration-300 flex justify-center items-center bg-gray-300 text-gray-600 cursor-not-allowed';
            botao.disabled = true;
            // Aqui futuramente você conectará com a API do Pipedrive!
            // Por enquanto, mostramos apenas o PlaceID que é o código único daquela empresa no Google.
            alert("Sucesso! Lead enviado para simulação. (ID do Google: " + placeId + ")");
        }
    </script>
