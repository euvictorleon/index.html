<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preserve Leads</title>
    <!-- Fonte elegante e moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Ícones minimalistas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --text-dark: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --primary: #111827; /* Preto chique */
            --primary-hover: #374151;
            --success: #047857; /* Verde Pipedrive elegante */
            --danger: #EF4444;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* CABEÇALHO */
        header {
            background: var(--surface);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-outline:hover { background: var(--bg); }

        /* ÁREA PRINCIPAL */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* BARRA DE BUSCA */
        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px 16px 48px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: box-shadow 0.2s;
            background: var(--surface);
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--primary-hover); }

        /* BARRA DE AÇÕES (Aparece após busca) */
        .action-bar {
            display: none; /* Escondido por padrão */
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .action-buttons { display: flex; gap: 12px; }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* GRID DE LEADS */
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .lead-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lead-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .lead-header { display: flex; gap: 12px; align-items: flex-start; }

        /* Checkbox Customizado */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            margin-top: 3px;
        }

        .lead-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .lead-info p { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        
        .tag-cliente {
            background: #FEF2F2;
            color: var(--danger);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            border: 1px solid #FECACA;
        }

        .load-more-container {
            text-align: center;
            margin-top: 40px;
            display: none;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="ph ph-leaf"></i> Preserve Leads
        </div>
        <div>
            <!-- Input file escondido para o CSV -->
            <input type="file" id="csv-upload" accept=".csv" style="display: none;">
            <button class="btn-outline" onclick="document.getElementById('csv-upload').click()">
                <i class="ph ph-database"></i> Atualizar Base (CSV)
            </button>
            <span id="base-status" style="font-size: 12px; color: var(--text-muted); margin-left: 10px;"></span>
        </div>
    </header>

    <main>
        <!-- Área de Busca -->
        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Ex: Hospitais em São Paulo... (Aperte Enter)">
            </div>
            <button class="btn-primary" onclick="realizarBusca()">Buscar</button>
        </div>

        <!-- Barra de Ações -->
        <div class="action-bar" id="action-bar">
            <div>
                <label style="font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="select-all" onchange="selecionarTudo(this)"> Selecionar todos permitidos
                </label>
            </div>
            <div class="action-buttons">
                <button class="btn-outline" onclick="exportarCSV()">
                    <i class="ph ph-download-simple"></i> Exportar
                </button>
                <button class="btn-success" onclick="enviarPipedrive()">
                    <i class="ph ph-paper-plane-right"></i> Enviar Pipedrive (<span id="count-selected">0</span>)
                </button>
            </div>
        </div>

        <!-- Resultados -->
        <div class="leads-grid" id="leads-grid">
            <!-- Os cards serão inseridos aqui pelo JavaScript -->
        </div>

        <!-- Carregar mais -->
        <div class="load-more-container" id="load-more">
            <button class="btn-outline" style="margin: 0 auto; padding: 12px 32px;" onclick="carregarMais()">
                Carregar +20 Resultados <i class="ph ph-caret-down"></i>
            </button>
        </div>
    </main>

    <script>
        // --- 1. SIMULAÇÃO DO SISTEMA DE MEMÓRIA (CLIENTES ATUAIS) ---
        // Aqui o sistema finge que já temos alguns clientes na memória para testar o bloqueio
        let clientesAtuais = ["HOSPITAL SANTA CRUZ", "CLÍNICA VIVER BEM", "PADARIA DO JOÃO"]; 

        // Lógica para ler o CSV do usuário (quando você fizer o upload)
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Aqui no futuro leremos o arquivo de verdade. Por enquanto, só dá o aviso.
                document.getElementById('base-status').innerText = `Base atualizada: ${file.name}`;
                alert("Base de clientes atualizada com sucesso no seu navegador!");
            }
        });

        // --- 2. LÓGICA DE BUSCA (Apertar Enter) ---
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                realizarBusca();
            }
        });

        function realizarBusca() {
            const query = document.getElementById('search-input').value;
            if(!query) return;

            // Mostra a barra de ações e o botão de carregar mais
            document.getElementById('action-bar').style.display = 'flex';
            document.getElementById('load-more').style.display = 'block';
            
            const grid = document.getElementById('leads-grid');
            grid.innerHTML = ''; // Limpa a busca anterior

            // SIMULAÇÃO: Criando dados falsos como se viessem do Google
            const empresasMock = [
                { nome: "Hospital São Luiz", endereco: "Av. Brasil, 1000 - SP", fone: "(11) 99999-1111", nota: "4.5" },
                { nome: "Hospital Santa Cruz", endereco: "Rua das Flores, 50 - SP", fone: "(11) 88888-2222", nota: "4.8" }, // Esse já é cliente
                { nome: "Laboratório Alpha", endereco: "Av. Paulista, 500 - SP", fone: "(11) 97777-3333", nota: "4.2" },
                { nome: "Clínica Viver Bem", endereco: "Rua Augusta, 10 - SP", fone: "(11) 96666-4444", nota: "3.9" } // Esse já é cliente
            ];

            // Renderizando os cards
            empresasMock.forEach((empresa, index) => {
                const isCliente = clientesAtuais.includes(empresa.nome.toUpperCase());
                
                const card = document.createElement('div');
                card.className = 'lead-card';
                
                card.innerHTML = `
                    <div class="lead-header">
                        <input type="checkbox" class="lead-checkbox" ${isCliente ? 'disabled' : ''} onchange="atualizarContador()">
                        <div class="lead-info">
                            <h3>${empresa.nome}</h3>
                            <p><i class="ph ph-map-pin"></i> ${empresa.endereco}</p>
                            <p style="margin-top: 4px; color: var(--text-dark);"><i class="ph ph-whatsapp-logo"></i> ${empresa.fone}</p>
                            <p style="margin-top: 4px; font-weight: 500;"><i class="ph ph-star" style="color:#F59E0B"></i> ${empresa.nota}</p>
                            ${isCliente ? `<span class="tag-cliente"><i class="ph ph-warning"></i> JÁ É CLIENTE - Não é possível selecionar</span>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            atualizarContador();
        }

        // --- 3. SELEÇÃO E BOTÕES DE AÇÃO ---
        function selecionarTudo(checkboxMestre) {
            const checkboxes = document.querySelectorAll('.lead-checkbox:not([disabled])');
            checkboxes.forEach(cb => cb.checked = checkboxMestre.checked);
            atualizarContador();
        }

        function atualizarContador() {
            const selecionados = document.querySelectorAll('.lead-checkbox:checked').length;
            document.getElementById('count-selected').innerText = selecionados;
        }

        function carregarMais() {
            alert("Aguarde... Puxando mais 20 leads do Google!");
        }

        function exportarCSV() {
            alert("Planilha Excel/CSV baixada com sucesso!");
        }

        function enviarPipedrive() {
            const selecionados = document.querySelectorAll('.lead-checkbox:checked').length;
            if(selecionados === 0) {
                alert("Selecione pelo menos um Lead novo para enviar ao Pipedrive.");
                return;
            }
            alert(`Sucesso! ${selecionados} leads foram enviados para o funil do Pipedrive.`);
        }
    </script>
</body>
</html>
